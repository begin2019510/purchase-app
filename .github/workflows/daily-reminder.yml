name: 每日记账提醒

on:
  schedule:
    # 北京时间 12:00 = UTC 4:00
    - cron: '0 4 * * *'
    # 北京时间 18:00 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 触发推送提醒
        run: |
          curl -s "https://121212121.top/api/push/trigger?token=${{ secrets.CRON_SECRET }}"
