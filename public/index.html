<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>й–ІеӣӘе–ҳз» пј„жӮҠ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#4f46e5;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#94a3b8;--border:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:var(--pri);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:600}
.header .stats{font-size:13px;opacity:.9}
.container{max-width:600px;margin:0 auto;padding:12px}
.card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative}
.card .name{font-size:15px;font-weight:600;margin-bottom:4px}
.card .meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.card .meta span{display:flex;align-items:center;gap:3px}
.card .price{font-size:17px;font-weight:700;color:var(--pri);margin-top:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-еҜ°е‘¬жӢұ{background:#fef3c7;color:#92400e}
.badge-е®ёи№ӯжӢұ{background:#dcfce7;color:#166534}
.badge-е®ёжҸ’еҹҢ{background:#dbeafe;color:#1e40af}
.badge-е®ёжҹҘвӮ¬вӮ¬{background:#fee2e2;color:#991b1b}
.card .note{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic}
.card .actions{position:absolute;top:14px;right:14px;display:flex;gap:6px}
.card .actions button{background:none;border:none;font-size:16px;cursor:pointer;padding:2px;border-radius:4px}
.card .actions button:hover{background:var(--border)}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--pri);color:#fff;border:none;font-size:28px;box-shadow:0 4px 12px rgba(79,70,229,.4);cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:17px;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--pri)}
.form-group textarea{resize:vertical;min-height:60px}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.btn:hover{opacity:.85}
.btn-primary{background:var(--pri);color:#fff}
.btn-secondary{background:var(--border);color:var(--text)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .icon{font-size:48px;margin-bottom:12px}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.export-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.loading{text-align:center;padding:40px;color:var(--muted)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:200;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>йҰғжҙ… й–ІеӣӘе–ҳз» пј„жӮҠ</h1>
    <div class="stats" id="stats">йҚ”зҠәжөҮж¶“?..</div>
  </div>
  <button class="export-btn" onclick="exportData()">зҖөз…Һеҡӯ</button>
</div>
<div class="container">
  <div class="filter-bar" id="filters"></div>
  <div id="list"><div class="loading">йҲҙ?йҚ”зҠәжөҮж¶“?..</div></div>
</div>
<button class="fab" onclick="openModal()">+</button>
<div class="modal-overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">йҸӮжқҝо–ғй–ІеӣӘе–ҳ</h2>
    <input type="hidden" id="editId">
    <div class="form-group"><label>йҚҹе——жҗ§йҚҡе¶ҮРһ *</label><input id="fName" placeholder="жҝЎеӮҰзҙ°жҫ¶еҝ“гҒүз‘ҒгӮ…з“ҷ"></div>
    <div class="form-group"><label>йӘһеҶІеҪҙ</label><select id="fPlatform"><option>йҺ·з…Һоҳҝжҫ¶?/option><option>еЁЈжЁәз–Ӯ</option><option>жөңоғҝз¬ў</option><option>йҺ¶ж ӯз…¶</option><option>йҚҸжңөзІ¬</option></select></div>
    <div class="form-group"><label>йҚ—жӣҡзҺҜй”ӣе қеҺ“й”ӣ?/label><input id="fPrice" type="number" step="0.01" placeholder="0"></div>
    <div class="form-group"><label>йҸҒдјҙеҷә</label><input id="fQty" type="number" value="1" min="1"></div>
    <div class="form-group"><label>йҗҳиҲөвӮ¬?/label><select id="fStatus"><option>еҜ°е‘¬жӢұ</option><option>е®ёи№ӯжӢұ</option><option>е®ёжҸ’еҹҢ</option><option>е®ёжҹҘвӮ¬вӮ¬</option></select></div>
    <div class="form-group"><label>йҸғгғҰж№Ў</label><input id="fDate" type="date"></div>
    <div class="form-group"><label>жҫ¶еӣЁж•һ</label><textarea id="fNote" placeholder="йҚҷоҲһвӮ¬?></textarea></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">йҚҷж Ёз§·</button>
      <button class="btn btn-primary" onclick="save()">ж·ҮжҝҶз“Ё</button>
    </div>
  </div>
</div>
<script>
const API='/api/items';
let items=[], currentFilter='йҚҸг„©е„ҙ';

async function api(method,body,id){
  let url=API; const opts={method,headers:{'Content-Type':'application/json'}};
  if(method==='DELETE')url+='?id='+id;
  else if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts); return r.json();
}

async function loadItems(){
  try{items=await api('GET');render();}
  catch(e){document.getElementById('list').innerHTML='<div class="empty"><div class="icon">йүӮ?/div>йҚ”зҠәжөҮжҫ¶иҫ«и§Ұй”ӣеІғоҮ¬йҚ’й”ӢжҹҠй–Іе¶ҲзҳҜ</div>';}
}

function render(){
  const filtered=currentFilter==='йҚҸг„©е„ҙ'?items:items.filter(i=>i['йҗҳиҲөвӮ¬?]===currentFilter);
  const sorted=[...filtered].sort((a,b)=>(b.created_at||0)-(a.created_at||0));
  const total=items.reduce((s,i)=>s+(i['йҚ—жӣҡзҺҜ']||0)*(i['йҸҒдјҙеҷә']||1),0);
  document.getElementById('stats').textContent=`${items.length} жө и·әжҷўйҚқ?и·Ҝ йҚҡе Јо…ё жҘј${total.toFixed(2)}`;
  const statuses=['йҚҸг„©е„ҙ','еҜ°е‘¬жӢұ','е®ёи№ӯжӢұ','е®ёжҸ’еҹҢ','е®ёжҹҘвӮ¬вӮ¬'];
  document.getElementById('filters').innerHTML=statuses.map(s=>{
    const c=s===currentFilter?'active':'';
    const n=s==='йҚҸг„©е„ҙ'?items.length:items.filter(i=>i['йҗҳиҲөвӮ¬?]===s).length;
    return `<button class="filter-btn ${c}" onclick="setFilter('${s}')">${s} (${n})</button>`;
  }).join('');
  if(!sorted.length){document.getElementById('list').innerHTML='<div class="empty"><div class="icon">йҰғж‘қ</div>йҸҶеӮӣжЈӨй–ІеӣӘе–ҳз’Ғжқҝз¶Қ<br>йҗҗз‘°еҪёж¶“е¬ӯоқ— + еЁЈиҜІе§һ</div>';return;}
  document.getElementById('list').innerHTML=sorted.map(i=>{
    const d=i['йҸғгғҰж№Ў'];
    let dateStr='';
    if(d){try{dateStr=new Date(d).toISOString().slice(0,10)}catch(e){dateStr=String(d)}}
    const qty=i['йҸҒдјҙеҷә']||1;
    const price=i['йҚ—жӣҡзҺҜ']||0;
    const status=i['йҗҳиҲөвӮ¬?]||'еҜ°е‘¬жӢұ';
    return `<div class="card">
      <div class="actions">
        <button onclick="editItem('${i.id}')" title="зјӮж ¬з·«">йүҒеҝҘз¬Қ</button>
        <button onclick="delItem('${i.id}')" title="йҚ’зҠ»ж«Һ">йҰғжЈҸй””?/button>
      </div>
      <div class="name">${esc(i['йҚҹе——жҗ§йҚҡе¶ҮРһ']||'')}</div>
      <div class="meta">
        <span>йҰғеҪ§ ${esc(i['йӘһеҶІеҪҙ']||'')}</span>
        <span class="badge badge-${status}">${status}</span>
        ${dateStr?`<span>йҰғжҗ® ${dateStr}</span>`:''}
        ${qty>1?`<span>и„і${qty}</span>`:''}
      </div>
      ${price?`<div class="price">жҘј${(price*qty).toFixed(2)}${qty>1?` (жҘј${price}и„і${qty})`:''}</div>`:''}
      ${i['жҫ¶еӣЁж•һ']?`<div class="note">йҰғжҢ° ${esc(i['жҫ¶еӣЁж•һ'])}</div>`:''}
    </div>`;
  }).join('');
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function setFilter(s){currentFilter=s;render();}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

function openModal(){
  document.getElementById('editId').value='';
  document.getElementById('modalTitle').textContent='йҸӮжқҝо–ғй–ІеӣӘе–ҳ';
  ['fName','fPrice','fQty','fNote','fDate'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('fPlatform').value='йҺ·з…Һоҳҝжҫ¶?;
  document.getElementById('fStatus').value='еҜ°е‘¬жӢұ';
  document.getElementById('fQty').value='1';
  document.getElementById('overlay').classList.add('active');
}

function editItem(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  document.getElementById('editId').value=id;
  document.getElementById('modalTitle').textContent='зјӮж ¬з·«й–ІеӣӘе–ҳ';
  document.getElementById('fName').value=i['йҚҹе——жҗ§йҚҡе¶ҮРһ']||'';
  document.getElementById('fPlatform').value=i['йӘһеҶІеҪҙ']||'йҺ·з…Һоҳҝжҫ¶?;
  document.getElementById('fPrice').value=i['йҚ—жӣҡзҺҜ']||'';
  document.getElementById('fQty').value=i['йҸҒдјҙеҷә']||1;
  document.getElementById('fStatus').value=i['йҗҳиҲөвӮ¬?]||'еҜ°е‘¬жӢұ';
  const d=i['йҸғгғҰж№Ў'];
  document.getElementById('fDate').value=d?new Date(d).toISOString().slice(0,10):'';
  document.getElementById('fNote').value=i['жҫ¶еӣЁж•һ']||'';
  document.getElementById('overlay').classList.add('active');
}

function closeModal(){document.getElementById('overlay').classList.remove('active');}

async function save(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('з’Үз–Ҝз·ӯйҚҸгғҘжҷўйҚқдҪёжӮ•з»ү?);return;}
  const data={
    name,
    platform:document.getElementById('fPlatform').value,
    price:parseFloat(document.getElementById('fPrice').value)||0,
    qty:parseInt(document.getElementById('fQty').value)||1,
    status:document.getElementById('fStatus').value,
    date:document.getElementById('fDate').value||null,
    note:document.getElementById('fNote').value.trim()||null,
  };
  const editId=document.getElementById('editId').value;
  if(editId){await api('PUT',{id:editId,...data});toast('е®ёеҸүжҙҝйҸӮ?);}
  else{await api('POST',data);toast('е®ёеҸүеқҠйҚ”?);}
  closeModal();await loadItems();
}

async function delItem(id){
  if(!confirm('зәӯоҶјз•ҫйҚ’зҠ»ж«Һй”ӣ?))return;
  await api('DELETE',null,id);toast('е®ёжҸ’еһ№й—„?);await loadItems();
}

function exportData(){
  const text=items.map(i=>`${i['йҚҹе——жҗ§йҚҡе¶ҮРһ']||''}\t${i['йӘһеҶІеҪҙ']||''}\tжҘј${i['йҚ—жӣҡзҺҜ']||0}\tи„і${i['йҸҒдјҙеҷә']||1}\t${i['йҗҳиҲөвӮ¬?]||''}\t${i['жҫ¶еӣЁж•һ']||''}`).join('\n');
  const b=new Blob(['йҚҹе——жҗ§\tйӘһеҶІеҪҙ\tйҚ—жӣҡзҺҜ\tйҸҒдјҙеҷә\tйҗҳиҲөвӮ¬д№—tжҫ¶еӣЁж•һ\n'+text],{type:'text/tab-separated-values;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`й–ІеӣӘе–ҳ_${new Date().toISOString().slice(0,10)}.tsv`;a.click();
}

loadItems();
</script>
</body>
</html>
