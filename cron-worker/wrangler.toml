name = "purchase-cron"
main = "index.js"
compatibility_date = "2024-01-01"

# 5 个定时任务（北京时间 → UTC）
# 1. 每日记账提醒 12:00 = UTC 4:00
# 2. 每日记账提醒 18:00 = UTC 10:00
# 3. 归档检查 10:00 = UTC 2:00
# 4. 周度汇总 周日 12:00 = UTC 4:03（错开3分钟避免冲突）
# 5. 月度汇总 每月1号 12:00 = UTC 4:05（错开5分钟避免冲突）
[triggers]
crons = [
  "0 4 * * *",
  "0 10 * * *",
  "0 2 * * *",
  "3 4 * * 7",
  "5 4 1 * *",
]

[vars]
API_BASE = "https://121212121.top"
